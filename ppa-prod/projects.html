<style>
/* ══ NAVBAR — identical behaviour to home page ══ */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: transparent;
  padding: 1rem 0;
  transition: background 0.5s ease, box-shadow 0.5s ease;
}
.navbar.scrolled {
  background: rgba(246,239,233,0.98);
  backdrop-filter: blur(12px);
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
}
/* Logo: cream on transparent, brown on scrolled — exactly like home */
.logo-cream { display: block; height: 44px; width: auto; }
.logo-brown { display: none;  height: 44px; width: auto; }
.navbar.scrolled .logo-cream { display: none; }
.navbar.scrolled .logo-brown { display: block; }
/* Nav links white on transparent, dark on scroll */
.nav-link { color: rgba(255,255,255,0.92) !important; transition: color 0.5s; }
.navbar.scrolled .nav-link { color: #2C2C2C !important; }
.nav-link::after { background: rgba(240,230,214,0.7); }
.navbar.scrolled .nav-link::after { background: #A3472D; }
.menu-toggle span { background: #F0E6D6; transition: background 0.4s; }
.navbar.scrolled .menu-toggle span { background: #A3472D; }

/* ══ PAGE HERO — terracotta so transparent navbar looks great ══ */
.projects-hero {
  margin-top: 0;
  padding: 7rem 1.5rem 3rem;
  background: linear-gradient(140deg, #9E3F26 0%, #A3472D 40%, #B8593D 100%);
  text-align: center;
  position: relative;
  overflow: hidden;
}
/* Topo lines in page hero too */
.projects-hero-topo {
  position: absolute; inset: 0;
  pointer-events: none; overflow: hidden;
}
.projects-hero-topo svg { width: 100%; height: 100%; position: absolute; inset: 0; }
.tl  { fill: none; stroke: rgba(240,215,185,0.18); stroke-width: 1; }
.tlt { fill: none; stroke: rgba(240,215,185,0.1);  stroke-width: 0.65; }
.projects-hero h1 { color: #F0E6D6; font-size: 2.8rem; margin-bottom: 0.5rem; position: relative; z-index: 2; }
.projects-hero p  { color: rgba(240,230,214,0.78); max-width: 500px; margin: 0 auto; position: relative; z-index: 2; }

/* ══ CATEGORY TABS ══ */
.category-tabs { position: sticky; top: 70px; z-index: 50; background: white; border-bottom: 1px solid rgba(163,71,45,0.1); }
.category-tabs-inner { display: flex; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; overflow-x: auto; }
.cat-tab { padding: 1rem 2rem; font-size: 0.95rem; font-weight: 600; color: var(--gray); border-bottom: 3px solid transparent; cursor: pointer; transition: all 0.3s; white-space: nowrap; text-decoration: none; display: block; }
.cat-tab:hover { color: var(--primary); }
.cat-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ══ CATEGORY SECTIONS ══ */
.category-section { padding: 3rem 1.5rem; }
.category-section:nth-child(even) { background: var(--light); }
.category-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
.category-title { font-family: var(--font-serif); font-size: 2rem; color: var(--primary); margin-bottom: 0.4rem; }
.category-desc  { color: var(--gray); font-size: 0.92rem; margin-bottom: 2.2rem; max-width: 580px; }

/* ══ PROJECT CARDS ══ */
.projects-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
.project-card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid rgba(163,71,45,0.1); transition: all 0.4s; cursor: pointer; }
.project-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(163,71,45,0.15); border-color: var(--primary); }
.project-thumb { position: relative; height: 240px; overflow: hidden; }
.project-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
.project-card:hover .project-thumb img { transform: scale(1.06); }
.project-count { position: absolute; bottom: 12px; right: 12px; background: rgba(58,31,22,0.82); color: white; font-size: 0.74rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.project-info { padding: 1.2rem 1.4rem; }
.project-name { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text); margin-bottom: 0.25rem; }
.project-meta { font-size: 0.8rem; color: var(--gray); display: flex; align-items: center; gap: 5px; }
.project-meta svg { width: 12px; height: 12px; color: var(--accent); flex-shrink: 0; }
.project-open { display: inline-flex; align-items: center; gap: 5px; margin-top: 0.6rem; font-size: 0.83rem; font-weight: 600; color: var(--primary); transition: gap 0.3s; }
.project-card:hover .project-open { gap: 9px; }
.project-open svg { width: 13px; height: 13px; }

/* ══ PROJECT MODAL ══ */
.project-modal { display: none; position: fixed; inset: 0; z-index: 1500; background: rgba(0,0,0,0.55); align-items: flex-end; justify-content: center; }
.project-modal.active { display: flex; }
.project-modal-panel { background: white; width: 100%; max-width: 1200px; max-height: 90vh; border-radius: 20px 20px 0 0; overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1); }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.project-modal-header { padding: 1.4rem 2rem; border-bottom: 1px solid rgba(163,71,45,0.1); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.project-modal-header h3 { font-family: var(--font-serif); color: var(--primary); font-size: 1.25rem; margin: 0; }
.project-modal-close { width: 38px; height: 38px; border-radius: 50%; background: var(--light); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
.project-modal-close:hover { background: var(--primary); }
.project-modal-close svg { width: 18px; height: 18px; color: var(--text); }
.project-modal-close:hover svg { color: white; }
.project-modal-grid { overflow-y: auto; padding: 1.5rem 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 10px; }
.modal-img { border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; cursor: pointer; transition: transform 0.3s; }
.modal-img:hover { transform: scale(1.02); }
.modal-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; display: block; }
.modal-img:hover img { transform: scale(1.06); }

/* ══ LIGHTBOX ══ */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 2000; align-items: center; justify-content: center; }
.lightbox.active { display: flex; }
.lightbox-inner { max-width: 90vw; max-height: 90vh; display: flex; flex-direction: column; align-items: center; }
.lightbox-inner img { max-width: 100%; max-height: 80vh; border-radius: 8px; object-fit: contain; }
.lightbox-caption { color: #E8D5C4; font-family: var(--font-serif); font-size: 0.9rem; margin-top: 0.8rem; }
.lightbox-close { position: fixed; top: 18px; right: 18px; width: 42px; height: 42px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; z-index: 2001; }
.lightbox-close:hover { background: var(--primary); }
.lightbox-close svg { width: 20px; height: 20px; color: white; }
.lightbox-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 42px; height: 42px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.3s; z-index: 2001; }
.lightbox-nav:hover { background: var(--primary); }
.lightbox-nav svg { width: 20px; height: 20px; color: white; }
.lightbox-prev { left: 18px; }
.lightbox-next { right: 18px; }

/* Footer */
.footer-links { grid-template-columns: repeat(5,1fr); }

/* Responsive */
@media (max-width: 768px) {
  .projects-hero { padding: 5.5rem 1.2rem 2rem; }

  .projects-list { grid-template-columns: 1fr; }
  .project-modal-grid { grid-template-columns: repeat(2,1fr); padding: 1rem; }
  .cat-tab { padding: 0.75rem 1.2rem; font-size: 0.85rem; }
}
</style>

/* Build tabs + sections */
(function buildPage(){
  const tabsEl=document.getElementById('tabsInner');
  const secEl =document.getElementById('categorySections');
  CATEGORY_DATA.forEach((cat,ci)=>{
    const tab=document.createElement('a');
    tab.href=`#${cat.id}`; tab.className='cat-tab'+(ci===0?' active':'');
    tab.textContent=cat.title;
    tab.addEventListener('click',()=>{document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');});
    tabsEl.appendChild(tab);
    const sec=document.createElement('section');
    sec.className='category-section'; sec.id=cat.id;
    sec.innerHTML=`<div class="container">
      <p class="category-label">${cat.label}</p>
      <h2 class="category-title">${cat.title}</h2>
      <p class="category-desc">${cat.desc}</p>
      <div class="projects-list">${cat.projects.map(p=>`
        <div class="project-card" onclick="openProject('${p.id}')">
          <div class="project-thumb">
            <img src="${p.cover}" alt="${p.name}" loading="lazy" width="400" height="240">
            <span class="project-count">${p.images.length} Photo${p.images.length!==1?'s':''}</span>
          </div>
          <div class="project-info">
            <h3 class="project-name">${p.name}</h3>
            <p class="project-meta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${p.meta}</p>
            <span class="project-open">View Project <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></span>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
    secEl.appendChild(sec);
  });
})();

/* Project modal */
let lightboxImages=[],lightboxIndex=0;
function openProject(id){
  let project=null;
  for(const cat of CATEGORY_DATA){project=cat.projects.find(p=>p.id===id);if(project)break;}
  if(!project)return;
  document.getElementById('modalTitle').textContent=project.name;
  const grid=document.getElementById('modalGrid');
  grid.innerHTML='';
  lightboxImages=project.images;
  project.images.forEach((img,i)=>{
    const div=document.createElement('div');
    div.className='modal-img';
    div.innerHTML=`<img src="${img.src}" alt="${img.label}" loading="lazy" width="400" height="300">`;
    div.addEventListener('click',()=>openLightbox(i));
    grid.appendChild(div);
  });
  document.getElementById('projectModal').classList.add('active');
  document.body.style.overflow='hidden';
}
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('projectModal').addEventListener('click',e=>{if(e.target===document.getElementById('projectModal'))closeModal();});
function closeModal(){document.getElementById('projectModal').classList.remove('active');document.body.style.overflow='';}

/* Lightbox */
function openLightbox(i){lightboxIndex=i;updateLb();document.getElementById('lightbox').classList.add('active');}
function updateLb(){document.getElementById('lightboxImg').src=lightboxImages[lightboxIndex].src;document.getElementById('lightboxCaption').textContent=lightboxImages[lightboxIndex].label;}
const lb=document.getElementById('lightbox');
document.getElementById('lightboxClose').onclick=()=>lb.classList.remove('active');
lb.addEventListener('click',e=>{if(e.target===lb)lb.classList.remove('active');});
document.getElementById('lightboxPrev').onclick=()=>{lightboxIndex=(lightboxIndex-1+lightboxImages.length)%lightboxImages.length;updateLb();};
document.getElementById('lightboxNext').onclick=()=>{lightboxIndex=(lightboxIndex+1)%lightboxImages.length;updateLb();};
document.addEventListener('keydown',e=>{
  if(lb.classList.contains('active')){
    if(e.key==='Escape')lb.classList.remove('active');
    if(e.key==='ArrowLeft'){lightboxIndex=(lightboxIndex-1+lightboxImages.length)%lightboxImages.length;updateLb();}
    if(e.key==='ArrowRight'){lightboxIndex=(lightboxIndex+1)%lightboxImages.length;updateLb();}
  }else if(document.getElementById('projectModal').classList.contains('active')&&e.key==='Escape')closeModal();
});

/* Navbar scroll — same logic as home */
window.addEventListener('scroll',()=>
  document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>60));

/* Menu toggle */
document.getElementById('menuToggle').addEventListener('click',()=>{
  document.getElementById('menuToggle').classList.toggle('active');
  document.getElementById('navMenu').classList.toggle('active');
});
document.querySelectorAll('.nav-link').forEach(l=>l.addEventListener('click',()=>{
  document.getElementById('menuToggle').classList.remove('active');
  document.getElementById('navMenu').classList.remove('active');
}));

/* Auto active tab from hash */
window.addEventListener('load',()=>{
  const hash=window.location.hash;
  if(hash){const tab=document.querySelector(`.cat-tab[href="${hash}"]`);if(tab){document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');}}
});
</script>
